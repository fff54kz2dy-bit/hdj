<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardar Contacto</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0F0F1A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .card {
    background: #1A1A2E;
    border: 1px solid #2D2B52;
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    max-width: 340px;
    width: 90%;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6C63FF, #A78BFA);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: white;
    margin: 0 auto 20px;
    letter-spacing: -1px;
  }

  h1 {
    color: #F0EDFF;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .subtitle {
    color: #8B85B0;
    font-size: 14px;
    margin-bottom: 8px;
  }

  .company {
    color: #A78BFA;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 28px;
  }

  .divider {
    height: 1px;
    background: #2D2B52;
    margin-bottom: 24px;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #1e1e30;
  }

  .info-row:last-of-type { border-bottom: none; }

  .info-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: #16213E;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .info-text {
    text-align: left;
  }

  .info-label {
    font-size: 11px;
    color: #5a5480;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .info-value {
    font-size: 14px;
    color: #D0CCFF;
    font-weight: 500;
  }

  .btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 16px;
    background: #6C63FF;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #5751D9; }
  .btn:active { transform: scale(0.98); }

  .hint {
    font-size: 12px;
    color: #5a5480;
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="card">

  <div class="avatar" id="avatar">HF</div>

  <h1 id="nombre">Heri DF</h1>
  <div class="subtitle" id="cargo">Cargo / Empresa</div>
  <div class="company" id="empresa"></div>

  <div class="divider"></div>

  <div class="info-row" id="row-tel">
    <div class="info-icon">📱</div>
    <div class="info-text">
      <div class="info-label">Teléfono</div>
      <div class="info-value" id="tel"></div>
    </div>
  </div>

  <div class="info-row" id="row-email">
    <div class="info-icon">✉️</div>
    <div class="info-text">
      <div class="info-label">Email</div>
      <div class="info-value" id="email"></div>
    </div>
  </div>

  <div class="info-row" id="row-web">
    <div class="info-icon">🌐</div>
    <div class="info-text">
      <div class="info-label">Web</div>
      <div class="info-value" id="web"></div>
    </div>
  </div>

  <a class="btn" id="btn-guardar" href="Heri_DF.vcf" download>
    ＋ Guardar contacto
  </a>
  <p class="hint">Toca el botón para añadir a tus contactos</p>

</div>

<script>
  /* ── Cambia estos datos para personalizar ── */
  const datos = {
    nombre:   "Heri DF",
    iniciales:"HF",
    cargo:    "Tu cargo aquí",
    empresa:  "Tu empresa",
    tel:      "+34 600 000 000",
    email:    "heri@email.com",
    web:      "www.tuweb.com",
    vcf:      "Heri_DF.vcf"
  };
  /* ──────────────────────────────────────── */

  document.getElementById("avatar").textContent   = datos.iniciales;
  document.getElementById("nombre").textContent   = datos.nombre;
  document.getElementById("cargo").textContent    = datos.cargo;
  document.getElementById("empresa").textContent  = datos.empresa;
  document.getElementById("tel").textContent      = datos.tel;
  document.getElementById("email").textContent    = datos.email;
  document.getElementById("web").textContent      = datos.web;
  document.getElementById("btn-guardar").href     = datos.vcf;

  if (!datos.tel)   document.getElementById("row-tel").style.display   = "none";
  if (!datos.email) document.getElementById("row-email").style.display = "none";
  if (!datos.web)   document.getElementById("row-web").style.display   = "none";

  /* Auto-descarga al abrir la página en móvil */
  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  if (isMobile) {
    setTimeout(() => {
      const a = document.createElement("a");
      a.href = datos.vcf;
      a.download = datos.vcf;
      a.click();
    }, 800);
  }
</script>

</body>
</html>
